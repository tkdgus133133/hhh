services:
  - type: web
    name: hu-export-dashboard
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && python scripts/download_fonts.py || echo "[fonts] download failed — fallback font will be used"
    startCommand: uvicorn frontend.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        value: "*"
      - key: PBS_FETCH
        value: "1"
      - key: PLAYWRIGHT_LIVE
        value: "0"
      - key: GEBIZ_LIVE
        value: "0"
      - key: REPORTS_DIR
        value: "/tmp/upharma_reports"
      - key: REPORTS_BUCKET
        value: "reports"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
